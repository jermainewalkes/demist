name: Release image

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Releases cut from a commit that predates Docker (e.g. the 1.0.0 baseline)
      # have no Dockerfile; skip the image build cleanly rather than failing.
      - id: check
        run: |
          if [ -f Dockerfile ]; then echo "build=true" >> "$GITHUB_OUTPUT"; else echo "build=false" >> "$GITHUB_OUTPUT"; fi
      - if: steps.check.outputs.build == 'true'
        uses: docker/setup-qemu-action@v3
      - if: steps.check.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3
      - if: steps.check.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.check.outputs.build == 'true'
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/jermainewalkes/demist
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - if: steps.check.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
